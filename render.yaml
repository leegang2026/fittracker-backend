services:
  - type: web
    name: fittracker-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fittracker-db
          property: connection-string
      - key: PYTHON_VERSION
        value: 3.12

databases:
  - name: fittracker-db
    databaseName: fittracker
    user: fittracker
